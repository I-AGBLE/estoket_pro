<h2>Add Expertise for: {{ service.service_title }}</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <!-- Add expertise and stay on page -->
    <button type="submit" name="action" value="add">Add Expertise</button>

    <!-- Add expertise and go to FAQs page -->
    <button type="submit" name="action" value="next">Add & Go to FAQs</button>
</form>

<h3>Existing Expertises</h3>
<ul>
    {% for expertise in expertises %}
        <li>
            <strong>{{ expertise.expertise_title }}</strong>: {{ expertise.expertise_about }}
        </li>
    {% empty %}
        <li>No expertise added yet.</li>
    {% endfor %}
</ul>
