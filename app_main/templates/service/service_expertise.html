<h2>Add/Edit Expertise for: {{ service.service_title }}</h2>

<form method="POST">
    {% csrf_token %}

    {% if editing %}
        <input type="hidden" name="expertise_id" value="{{ editing }}">
    {% endif %}

    {{ form.as_p }}

    <button type="submit" name="action" value="add">
        {% if editing %}Update Expertise{% else %}Add Expertise{% endif %}
    </button>

    <button type="submit" name="action" value="next" novalidate>
        {% if editing %}Update & Go to FAQs{% else %}Add & Go to FAQs{% endif %}
    </button>
</form>

<h3>Existing Expertise</h3>
<ul>
    {% for exp in expertises %}
        <li>
            {{ exp.expertise_title }}
            <a href="?edit={{ exp.id }}">Edit</a>
            |
            <a href="{% url 'app_main:delete_service_expertise' exp.id %}" 
               onclick="return confirm('Are you sure you want to delete this expertise?');">
               Delete
            </a>
        </li>
    {% empty %}
        <li>No expertise added yet.</li>
    {% endfor %}
</ul>
