<h2>Add/Edit FAQ for: {{ service.service_title }}</h2>

<form method="POST">
    {% csrf_token %}

    {% if editing %}
        <input type="hidden" name="faq_id" value="{{ editing }}">
    {% endif %}

    {{ form.as_p }}

    <button type="submit" name="action" value="add">
        {% if editing %}Update FAQ{% else %}Add FAQ{% endif %}
    </button>

    <button type="submit" name="action" value="next" novalidate>
        {% if editing %}Update & Finish{% else %}Add & Finish{% endif %}
    </button>
</form>



<h3>Existing FAQs</h3>
<ul>
    {% for faq in faqs %}
        <li>
            <strong>{{ faq.faq_question }}</strong>
            <a href="?edit={{ faq.id }}">Edit</a>
            |
            <a href="{% url 'app_main:delete_service_faq' faq.id %}" 
               onclick="return confirm('Are you sure you want to delete this FAQ?');">
               Delete
            </a>
        </li>
    {% empty %}
        <li>No FAQs added yet.</li>
    {% endfor %}
</ul>
